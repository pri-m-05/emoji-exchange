
version: "3.9"

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"   
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example

  api:
    
    build: ../docker
    ports:
      - "8080:8080"     
    environment:
      HTTP_PORT: "8080"
      JWT_SECRET: "devsecret"
      MONGO_URI: "mongodb://root:example@mongo:27017/?authSource=admin"
      MONGO_DB: "emoji"
      STARTING_CASH: "100000"
    depends_on:
      - mongo
